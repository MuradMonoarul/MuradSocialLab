  .scrollbar-thin::-webkit-scrollbar-thumb { background: #C9C4B8; border-radius: 4px; }

<script>
/* ============================ SUPABASE CONFIG ============================ */
const SUPABASE_URL = 'https://boyzbgriwoosdhzfumvh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJveXpiZ3Jpd29vc2RoemZ1bXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzUzMzEsImV4cCI6MjA5OTAxMTMzMX0.DthaW-MKXJRz0K-EsUT0lNXA49jKHDnD1Be-V-Yn9IU';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PEOPLE_LEVELS = ['PhD', 'MPhil', 'Graduate', 'Undergraduate'];

/* ============================ STATE ============================ */
const state = {
  isAdmin: sessionStorage.getItem('msl_admin') === 'true',
  adminPassword: null,
  adminTab: 'overview',
  articles: [],
  categories: [],
  people: [],
  loadingArticles: true,
  loadingCategories: true,
  loadingPeople: true,
  editingPost: null,
  editingPerson: null,
};

/* ============================ UTILS ============================ */
function escapeHtml(str){
  if(str === undefined || str === null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function slugify(str){
  return String(str || '').toLowerCase().trim().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').slice(0,60);
}
function formatDate(d){
  const date = new Date(d);
  if(isNaN(date.getTime())) return d || '';
  return date.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}
function isPinned(post){
  return post.pinned === 'TRUE' || post.pinned === true || post.pinned === 'true';
}
function sortedArticles(list){
  return [...list].sort((a,b) => new Date(b.date) - new Date(a.date));
}
function toast(msg, type='info'){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  const colors = { info: 'bg-ink text-paper dark:bg-paper dark:text-ink', error: 'bg-rust text-white', success: 'bg-emerald-700 text-white' };
  el.className = `px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium ${colors[type]||colors.info} fade-route`;
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(), 300); }, 2600);
}

/* ============================ THEME ============================ */
function initTheme(){
  const saved = localStorage.getItem('msl_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const dark = saved ? saved === 'dark' : prefersDark;
  document.documentElement.classList.toggle('dark', dark);
  updateThemeIcon(dark);
}
function toggleDark(){
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('msl_theme', dark ? 'dark' : 'light');
  updateThemeIcon(dark);
}
function updateThemeIcon(dark){
  document.getElementById('theme-icon-sun').classList.toggle('hidden', !dark);
  document.getElementById('theme-icon-moon').classList.toggle('hidden', dark);
}

/* ============================ DATA FETCHING (SUPABASE) ============================ */
async function loadArticles(){
  state.loadingArticles = true;
  try{
    const { data, error } = await supabase
      .from('posts')
      .select('*')
      .order('date', { ascending: false });
    
    if(error) throw error;
    state.articles = Array.isArray(data) ? data : [];
  }catch(e){
    console.error('Failed to load articles', e);
    state.articles = [];
    toast('Could not load articles from the database.', 'error');
  }
  state.loadingArticles = false;
  render();
}

async function loadCategories(){
  state.loadingCategories = true;
  try{
    const { data, error } = await supabase
      .from('categories')
      .select('name')
      .order('name', { ascending: true });
    
    if(error) throw error;
    state.categories = Array.isArray(data) ? data.map(c => c.name).filter(Boolean) : [];
  }catch(e){
    console.error('Failed to load categories', e);
    state.categories = [];
  }
  state.loadingCategories = false;
  renderTopicNav();
}

async function loadPeople(){
  state.loadingPeople = true;
  try{
    const { data, error } = await supabase
      .from('people')
      .select('*')
      .order('role', { ascending: true });
    
    if(error) throw error;
    state.people = Array.isArray(data) ? data : [];
  }catch(e){
    console.error('Failed to load people', e);
    state.people = [];
    toast('Could not load people profiles.', 'error');
  }
  state.loadingPeople = false;
  render();
}

async function loadConfig(){
  try{
    const { data, error } = await supabase
      .from('config')
      .select('value')
      .eq('key', 'admin_password')
      .single();
    
    if(error && error.code !== 'PGRST116') throw error;
    state.adminPassword = data ? data.value : null;
  }catch(e){
    console.error('Failed to load config', e);
  }
}

/* ============================ TOPIC NAV ============================ */
function renderTopicNav(){
  const desktop = document.getElementById('topic-list-nav');
  const mobile = document.getElementById('topic-list-mobile');
  if(!desktop || !mobile) return;
  if(state.loadingCategories){
    desktop.innerHTML = `<div class="px-4 py-2 text-sm opacity-50">Loading…</div>`;
    mobile.innerHTML = '';
    return;
  }
  if(!state.categories.length){
    desktop.innerHTML = `<div class="px-4 py-2 text-sm opacity-50">No topics yet</div>`;
    mobile.innerHTML = '';
    return;
  }
  desktop.innerHTML = state.categories.map(c => `
    <a href="index.html#topic:${encodeURIComponent(c)}" target="_blank" class="block px-4 py-2 text-sm hover:bg-line/40 dark:hover:bg-lineDark/40 transition-colors">${escapeHtml(c)}</a>
  `).join('');
  mobile.innerHTML = state.categories.map(c => `
    <a href="index.html#topic:${encodeURIComponent(c)}" target="_blank" class="text-sm opacity-80">${escapeHtml(c)}</a>
  `).join('');
}

/* ============================ ADMIN LOGIN ============================ */
function adminLoginView(){
  return `
  <div class="fade-route max-w-sm mx-auto px-5 py-24">
    <h1 class="font-serif-lab text-2xl font-semibold mb-2 text-center">Admin Access</h1>
    <p class="text-sm opacity-60 text-center mb-8">Hey, Murad! Enter the master key to continue.</p>
    <form onsubmit="handleAdminLogin(event)" class="flex flex-col gap-4">
      <input id="admin-key-input" type="password" placeholder="Master key" required
        class="bg-transparent border border-line dark:border-lineDark rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-rust" />
      <button type="submit" class="bg-ink text-paper dark:bg-paper dark:text-ink rounded-lg py-3 text-sm font-semibold hover:bg-rust dark:hover:bg-rust dark:hover:text-white transition-colors">
        Unlock Dashboard
      </button>
    </form>
    <div class="text-center mt-8">
      <a href="index.html" class="text-sm underline-grow opacity-60">← Back to the site</a>
    </div>
  </div>`;
}

async function handleAdminLogin(e){
  e.preventDefault();
  const val = document.getElementById('admin-key-input').value;
  if(!state.adminPassword){ await loadConfig(); }
  if(state.adminPassword && val === state.adminPassword){
    state.isAdmin = true;
    sessionStorage.setItem('msl_admin', 'true');
    toast('Welcome back, Murad.', 'success');
    render();
  } else {
    toast('Incorrect master key.', 'error');
  }
}

function adminLogout(){
  state.isAdmin = false;
  sessionStorage.removeItem('msl_admin');
  render();
}

/* ============================ ADMIN DASHBOARD ============================ */
function adminDashboardView(){
  return `
  <div class="fade-route">
    <div class="border-b border-line dark:border-lineDark">
      <div class="max-w-6xl mx-auto px-5 sm:px-8 py-6 flex items-center justify-between">
        <h1 class="font-serif-lab text-2xl font-semibold">Admin Dashboard</h1>
        <button onclick="adminLogout()" class="bg-rust text-white rounded-lg px-4 py-2 text-sm font-semibold hover:bg-rustlight transition-colors">Log Out</button>
      </div>
      <div class="max-w-6xl mx-auto px-5 sm:px-8 flex gap-6 text-sm -mb-px">
        <button onclick="switchAdminTab('overview')" class="pb-3 border-b-2 transition-colors ${state.adminTab==='overview' ? 'border-rust text-rust font-semibold' : 'border-transparent opacity-60 hover:opacity-100'}">Overview</button>
        <button onclick="switchAdminTab('articles')" class="pb-3 border-b-2 transition-colors ${state.adminTab==='articles' ? 'border-rust text-rust font-semibold' : 'border-transparent opacity-60 hover:opacity-100'}">Article / Category Manager</button>
        <button onclick="switchAdminTab('people')" class="pb-3 border-b-2 transition-colors ${state.adminTab==='people' ? 'border-rust text-rust font-semibold' : 'border-transparent opacity-60 hover:opacity-100'}">People Profile Manager</button>
      </div>
    </div>

    <div class="max-w-6xl mx-auto px-5 sm:px-8 py-10">
      ${state.adminTab === 'people' ? peopleManagerTab() : state.adminTab === 'overview' ? overviewTab() : articleManagerTab()}
    </div>

    <div id="editor-modal" class="hidden"></div>
    <div id="person-modal" class="hidden"></div>
  </div>`;
}

function switchAdminTab(tab){
  state.adminTab = tab;
  render();
}

/* ============================ OVERVIEW / DASHBOARD TAB ============================ */
function overviewTab(){
  const loading = state.loadingArticles || state.loadingPeople || state.loadingCategories;
  const articles = state.articles || [];
  const people = state.people || [];
  const categories = state.categories || [];

  const pinnedCount = articles.filter(isPinned).length;
  const uncategorized = articles.filter(a => !a.category || !categories.includes(a.category)).length;

  const catCounts = categories.map(c => ({
    name: c,
    count: articles.filter(a => a.category === c).length
  })).sort((a,b) => b.count - a.count);

  const levelCounts = PEOPLE_LEVELS.map(l => ({
    name: l,
    count: people.filter(p => p.role === l).length
  }));

  const latest = sortedArticles(articles)[0];

  const statCard = (label, value, sub='') => `
    <div class="border border-line dark:border-lineDark rounded-xl p-5 flex flex-col gap-1">
      <span class="text-xs uppercase tracking-widest opacity-60 font-semibold">${label}</span>
      <span class="font-serif-lab text-3xl font-semibold text-rust">${value}</span>
      ${sub ? `<span class="text-xs opacity-60">${sub}</span>` : ''}
    </div>`;

  if(loading){
    return `<div class="text-sm opacity-60 py-10 text-center">Loading dashboard…</div>`;
  }

  return `
  <div class="flex flex-col gap-10">
    <section class="grid grid-cols-2 sm:grid-cols-4 gap-4">
      ${statCard('Articles', articles.length, `${pinnedCount} featured`)}
      ${statCard('People', people.length, `across ${PEOPLE_LEVELS.length} levels`)}
      ${statCard('Topics', categories.length)}
      ${statCard('Uncategorized', uncategorized, uncategorized ? 'needs a topic' : 'all set')}
    </section>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="border border-line dark:border-lineDark rounded-xl p-5">
        <h3 class="text-xs uppercase tracking-widest opacity-60 font-semibold mb-4">Articles by Topic</h3>
        ${catCounts.length ? `
          <div class="flex flex-col gap-3">
            ${catCounts.map(c => `
              <div>
                <div class="flex items-center justify-between text-sm mb-1">
                  <span>${escapeHtml(c.name)}</span>
                  <span class="opacity-60">${c.count}</span>
                </div>
                <div class="h-1.5 rounded-full bg-line/40 dark:bg-lineDark/40 overflow-hidden">
                  <div class="h-full bg-rust rounded-full" style="width:${articles.length ? Math.round((c.count/articles.length)*100) : 0}%"></div>
                </div>
              </div>
            `).join('')}
          </div>
        ` : `<span class="text-sm opacity-50">No topics yet.</span>`}
      </div>

      <div class="border border-line dark:border-lineDark rounded-xl p-5">
        <h3 class="text-xs uppercase tracking-widest opacity-60 font-semibold mb-4">People by Level</h3>
        <div class="flex flex-col gap-3">
          ${levelCounts.map(l => `
            <div>
              <div class="flex items-center justify-between text-sm mb-1">
                <span>${escapeHtml(l.name)}</span>
                <span class="opacity-60">${l.count}</span>
              </div>
              <div class="h-1.5 rounded-full bg-line/40 dark:bg-lineDark/40 overflow-hidden">
                <div class="h-full bg-rust rounded-full" style="width:${people.length ? Math.round((l.count/people.length)*100) : 0}%"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <section>
      <h3 class="text-xs uppercase tracking-widest opacity-60 font-semibold mb-4">At a Glance</h3>
      <div class="border border-line dark:border-lineDark rounded-xl p-5 flex flex-col gap-3 text-sm">

/* ---------- Category CRUD ---------- */
async function addCategory(e){
  e.preventDefault();
  const input = document.getElementById('new-topic-input');
  const name = input.value.trim();
  if(!name) return;
  if(state.categories.some(c => c.toLowerCase() === name.toLowerCase())){
    toast('Topic already exists.', 'error'); return;
  }
  try{
    const { error } = await supabase
      .from('categories')
      .insert([{ name }]);
    
    if(error) throw error;
    state.categories.push(name);
    toast('Topic added.', 'success');
    input.value = '';
    render();
  }catch(err){
    console.error(err); toast('Failed to add topic.', 'error');
  }
}

async function deleteCategory(name){
  if(!confirm(`Delete topic "${name}"?`)) return;
  try{
    const { error } = await supabase
      .from('categories')
      .delete()
      .eq('name', name);
    
    if(error) throw error;
    state.categories = state.categories.filter(c => c !== name);
    toast('Topic removed.', 'success');
    render();
  }catch(err){
    console.error(err); toast('Failed to delete topic.', 'error');
  }
}

/* ---------- Post CRUD ---------- */
async function togglePin(id, currentlyPinned){
  try{
    const { error } = await supabase
      .from('posts')
      .update({ pinned: currentlyPinned ? 'FALSE' : 'TRUE' })
      .eq('id', id);
    
    if(error) throw error;
    const post = state.articles.find(p => p.id === id);
    if(post) post.pinned = currentlyPinned ? 'FALSE' : 'TRUE';
    toast(currentlyPinned ? 'Unpinned.' : 'Pinned as featured.', 'success');
    render();
  }catch(err){
    console.error(err); toast('Failed to update pin status.', 'error');
  }
}

async function deletePost(id){
  if(!confirm('Delete this post permanently?')) return;
  try{
    const { error } = await supabase
      .from('posts')
      .delete()
      .eq('id', id);
    
    if(error) throw error;
    state.articles = state.articles.filter(p => p.id !== id);
    toast('Post deleted.', 'success');
    render();
  }catch(err){
    console.error(err); toast('Failed to delete post.', 'error');
  }
}

function toolbarButton(label, cmd, arg, title, extraClass=''){
  return `<button type="button" data-cmd="${cmd}" data-arg="${arg||''}" onclick="execToolbarCmd('${cmd}', ${arg ? `'${arg}'` : 'null'})"
    class="toolbar-btn text-xs font-semibold px-2.5 py-1.5 rounded-md hover:bg-line/50 dark:hover:bg-lineDark/50 ${extraClass}" title="${title}">${label}</button>`;
}

function execToolbarCmd(cmd, arg){
  document.getElementById('ed-content').focus();
  document.execCommand(cmd, false, arg || undefined);
  updateToolbarState();
}

function updateToolbarState(){
  const buttons = document.querySelectorAll('#editor-toolbar button[data-cmd]');
  buttons.forEach(btn => {
    const cmd = btn.dataset.cmd;
    const arg = btn.dataset.arg;
    let active = false;
    try{
      if(cmd === 'formatBlock'){
        active = document.queryCommandValue('formatBlock').toLowerCase() === arg.toLowerCase();
      } else {
        active = document.queryCommandState(cmd);
      }
    }catch(e){}
    btn.classList.toggle('is-active', active);
  });
}

function insertLink(){
  const ed = document.getElementById('ed-content');
  ed.focus();
  const sel = window.getSelection();
  const hasSelection = sel && sel.rangeCount > 0 && ed.contains(sel.anchorNode) && sel.toString().trim() !== '';

  let url = prompt('Enter URL (include https://):');
  if(!url) return;
  url = url.trim();
  if(!/^https?:\/\//i.test(url) && !url.startsWith('/') && !url.startsWith('#')){
    url = 'https://' + url;
  }

  if(hasSelection){
    document.execCommand('createLink', false, url);
    ed.querySelectorAll('a').forEach(a => {
      if(a.getAttribute('href') === url && !a.dataset.linked){
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.dataset.linked = '1';
      }
    });
  } else {
    const text = prompt('Link text:') || url;
    const html = `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(text)}</a>&nbsp;`;
    document.execCommand('insertHTML', false, html);
  }
  updateToolbarState();
}

function insertGraphic(){
  const url = prompt('Image URL:');
  if(!url) return;
  const caption = prompt('Caption (optional):') || '';
  const html = `<figure class="clear-prose"><div class="article-img-container"><img src="${escapeHtml(url)}" loading="lazy"/></div><figcaption>${escapeHtml(caption)}</figcaption></figure><p><br></p>`;
  document.getElementById('ed-content').focus();
  document.execCommand('insertHTML', false, html);
}

      .from('people')
      .delete()
      .eq('id', id);
    
    if(error) throw error;
    state.people = state.people.filter(p => p.id !== id);
    toast('Profile deleted.', 'success');
    render();
  }catch(err){
    console.error(err); toast('Failed to delete profile.', 'error');
  }
}

/* ============================ RENDER ============================ */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = state.isAdmin ? adminDashboardView() : adminLoginView();
  renderTopicNav();
}

/* ============================ INIT ============================ */
async function init(){
  initTheme();
  render();
  await Promise.all([loadArticles(), loadCategories(), loadPeople(), loadConfig()]);
  render();
}

init();
</script>
</body>
</html>
